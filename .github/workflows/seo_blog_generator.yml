name: SEO Blog Auto-Generator

on:
  schedule:
    # Pazartesi, Çarşamba ve Cuma günleri Türkiye saati ile 10:00'da çalışır (UTC 07:00)
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch: # Manuel tetikleme (Test için)

jobs:
  generate-seo-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Vertex Key File
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > vertex-key.json

      - name: Run SEO Blog Generator AI
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          USE_VERTEX_AI: "True"
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'gen-lang-client-0807839854' }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'us-central1' }}
          GOOGLE_APPLICATION_CREDENTIALS: "vertex-key.json"
          GEMINI_MODEL: "gemini-2.0-flash-lite"
        run: |
          python generate_seo_blog.py
