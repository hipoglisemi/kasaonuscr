name: Kartavantaj Auto Scrapers

run-name: "🤖 Scraper: ${{ github.event.inputs.scraper || 'Tümü (Zamanlı)' }}"

on:
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Çalıştırılacak scraper (boş = tümü)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - akbank_axess
          - akbank_business
          - akbank_free
          - akbank_wings
          - chippin
          - denizbank
          - enpara
          - garanti_bonus
          - garanti_milesandsmiles
          - garanti_shopandfly
          - isbankasi_genc
          - isbankasi_maximiles
          - isbankasi_maximum
          - masterpass
          - paraf
          - paraf_genc
          - qnb
          - teb
          - turkiyefinans
          - vakifbank
          - yapikredi_adios
          - yapikredi_crystal
          - yapikredi_world
          - ziraat
          - param
      limit:
        description: 'İşbankası için limit (örn: 5), boş bırakılırsa limitsiz çalışır'
        required: false
        type: string
        default: ''

  schedule:
    - cron: '0 0 * * *'   # TSİ 03:00 (UTC 00:00)
    - cron: '0 12 * * *'  # TSİ 15:00 (UTC 12:00)

jobs:
  # Step 1: Compute which scrapers to run
  setup:
    runs-on: ubuntu-22.04
    outputs:
      scrapers: ${{ steps.set-matrix.outputs.scrapers }}
    steps:
      - id: set-matrix
        run: |
          ALL='["akbank_axess","akbank_business","akbank_free","akbank_wings","chippin","denizbank","enpara","garanti_bonus","garanti_milesandsmiles","garanti_shopandfly","isbankasi_genc","isbankasi_maximiles","isbankasi_maximum","masterpass","paraf","paraf_genc","param","qnb","teb","turkiyefinans","vakifbank","yapikredi_adios","yapikredi_crystal","yapikredi_play","yapikredi_world","ziraat"]'
          INPUT="${{ github.event.inputs.scraper }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            echo "scrapers=$ALL" >> $GITHUB_OUTPUT
          else
            echo "scrapers=[\"$INPUT\"]" >> $GITHUB_OUTPUT
          fi

  # Step 2: Run selected scrapers in parallel
  scrape:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        scraper: ${{ fromJson(needs.setup.outputs.scrapers) }}

    name: "🤖 ${{ matrix.scraper }}"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies (Chrome & Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install selenium-stealth pyvirtualdisplay webdriver-manager

    - name: Install Playwright Browsers
      run: |
        playwright install chromium --with-deps

    - name: Run Scraper
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PYTHONPATH: ${{ github.workspace }}
        PYTHONUNBUFFERED: '1'
        DISPLAY: ':99'
      run: |
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 2
        
        LIMIT_ARG=""
        if [ -n "${{ github.event.inputs.limit }}" ]; then
          LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
        fi
        
        if [[ "${{ matrix.scraper }}" == isbankasi_* ]] && [ -n "$LIMIT_ARG" ]; then
          python -u src/scrapers/${{ matrix.scraper }}.py $LIMIT_ARG
        else
          python -u src/scrapers/${{ matrix.scraper }}.py
        fi




