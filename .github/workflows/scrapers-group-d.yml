name: "🆗 Scrapers – Grup D"
# TEB, TürkiyeFinans, Vakıfbank, YapıKredi (Adios + Crystal + Play + World), Ziraat
# TSİ 04:30 ve 16:30 → UTC 01:30 ve 13:30

on:
  schedule:
    - cron: '30 1 * * *'   # TSİ 04:30 (UTC 01:30) — günde 1 kere
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        scraper:
          - teb
          - turkiyefinans
          - vakifbank
          - yapikredi_adios
          - yapikredi_crystal
          - yapikredi_play
          - yapikredi_world
          - ziraat

    name: "🤖 ${{ matrix.scraper }}"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install selenium-stealth pyvirtualdisplay webdriver-manager

    - name: Install Playwright Browsers
      run: playwright install chromium --with-deps

    - name: Run Scraper
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
        GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
        GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
        GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PYTHONPATH: ${{ github.workspace }}
        PYTHONUNBUFFERED: '1'
        DISPLAY: ':99'
      run: |
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 2
        python -u src/scrapers/${{ matrix.scraper }}.py
