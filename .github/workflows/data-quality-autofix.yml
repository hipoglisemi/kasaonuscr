name: Data Quality Auto-Fixer

on:
  schedule:
    # TSİ 06:00 → UTC 03:00 — günde 1 kere
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  autofix:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies (Chrome & Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Quality Auto-Fixer
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        AI_PROVIDER: ${{ secrets.AI_PROVIDER }}      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python data_quality_autofix.py
