name: DB Connectivity Test

on:
  workflow_dispatch:

jobs:
  test-db:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Test PostgreSQL Connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          echo "Testing DB connectivity..."
          python3 -c "
          import os, sys
          db_url = os.environ.get('DATABASE_URL', '')
          print(f'[INFO] DATABASE_URL set: {bool(db_url)}')
          print(f'[INFO] GEMINI_API_KEY set: {bool(os.environ.get(\"GEMINI_API_KEY\", \"\"))}')
          if not db_url:
              print('[ERROR] DATABASE_URL is empty!')
              sys.exit(1)
          print('[INFO] Installing psycopg2...')
          "
          pip install psycopg2-binary sqlalchemy -q
          python3 -c "
          import os, sys
          from sqlalchemy import create_engine, text
          db_url = os.environ['DATABASE_URL']
          print(f'[INFO] Connecting to DB...')
          try:
              engine = create_engine(db_url, connect_args={'connect_timeout': 10})
              with engine.connect() as conn:
                  result = conn.execute(text('SELECT count(*) FROM banks'))
                  count = result.fetchone()[0]
                  print(f'[SUCCESS] DB connected! Banks count: {count}')
          except Exception as e:
              print(f'[FAIL] DB connection failed: {e}')
              sys.exit(1)
          "
