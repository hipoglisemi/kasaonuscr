name: "🅰️ Scrapers – Grup A"
# Akbank (4), AmericanExpress, Chippin, Denizbank
# TSİ 03:00 ve 15:00 → UTC 00:00 ve 12:00

on:
  schedule:
    - cron: '0 0 * * *'   # TSİ 03:00 (UTC 00:00) — günde 1 kere
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        scraper:
          - akbank_axess
          - akbank_business
          - akbank_free
          - akbank_wings
          - albaraka
          - americanexpress
          - chippin
          - denizbank

    name: "🤖 ${{ matrix.scraper }}"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install selenium-stealth pyvirtualdisplay webdriver-manager

    - name: Install Playwright Browsers
      run: playwright install chromium --with-deps

    - name: Create Vertex Key File
      run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > vertex-key.json

    - name: Run Scraper
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        AI_PROVIDER: "vertex"
        GEMINI_MODEL: "gemini-2.5-flash-lite"
        USE_VERTEX_AI: "True"
        GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || 'gen-lang-client-0807839854' }}
        GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'us-central1' }}
        GOOGLE_APPLICATION_CREDENTIALS: "vertex-key.json"
        PYTHONPATH: ${{ github.workspace }}
        PYTHONUNBUFFERED: '1'
        DISPLAY: ':99'
      run: |
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 2
        python -u src/scrapers/${{ matrix.scraper }}.py
