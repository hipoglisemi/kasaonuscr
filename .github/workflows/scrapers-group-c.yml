name: "🆑 Scrapers – Grup C"
# İşbankası (Genç + Maximiles + Maximum), Masterpass, Paraf (x2), Param, QNB
# TSİ 04:00 ve 16:00 → UTC 01:00 ve 13:00

on:
  schedule:
    - cron: '0 1 * * *'   # TSİ 04:00 (UTC 01:00) — günde 1 kere
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        scraper:
          - isbankasi_genc
          - isbankasi_maximiles
          - isbankasi_maximum
          - masterpass
          - paraf
          - paraf_genc
          - param
          - qnb

    name: "🤖 ${{ matrix.scraper }}"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install selenium-stealth pyvirtualdisplay webdriver-manager

    - name: Install Playwright Browsers
      run: playwright install chromium --with-deps

    - name: Run Scraper
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        PYTHONPATH: ${{ github.workspace }}
        PYTHONUNBUFFERED: '1'
        DISPLAY: ':99'
      run: |
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 2
        python -u src/scrapers/${{ matrix.scraper }}.py
